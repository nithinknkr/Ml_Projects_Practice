<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Student Performance Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 300px; padding: 5px; }
        button { margin-top: 20px; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Predict Student Math Score</h1>
    <form action="/" method="post">
        <label for="gender">Gender</label>
        <select name="gender" id="gender">
            <option value="female">female</option>
            <option value="male">male</option>
        </select>

        <label for="race_ethnicity">Race/Ethnicity</label>
        <select name="race_ethnicity" id="race_ethnicity">
            <option value="group A">group A</option>
            <option value="group B">group B</option>
            <option value="group C">group C</option>
            <option value="group D">group D</option>
            <option value="group E">group E</option>
        </select>

        <label for="parental_level_of_education">Parental Level of Education</label>
        <select name="parental_level_of_education" id="parental_level_of_education">
            <option value="associate's degree">associate's degree</option>
            <option value="bachelor's degree">bachelor's degree</option>
            <option value="high school">high school</option>
            <option value="master's degree">master's degree</option>
            <option value="some college">some college</option>
        </select>

        <label for="lunch">Lunch</label>
        <select name="lunch" id="lunch">
            <option value="free/reduced">free/reduced</option>
            <option value="standard">standard</option>
        </select>

        <label for="test_preparation_course">Test Preparation Course</label>
        <select name="test_preparation_course" id="test_preparation_course">
            <option value="none">none</option>
            <option value="completed">completed</option>
        </select>

        <label for="writing_score">Writing Score</label>
        <input type="number" name="writing_score" id="writing_score" min="0" max="100" step="0.01" required />

        <label for="reading_score">Reading Score</label>
        <input type="number" name="reading_score" id="reading_score" min="0" max="100" step="0.01" required />

        <button type="submit">Predict</button>
    </form>
    <p><a href="/train">Retrain model</a> (use to rebuild artifacts)</p>
</body>
</html>
